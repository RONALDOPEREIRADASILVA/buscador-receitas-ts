<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>buscador-receitas-ts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body class="bg-light">
    <div class="app">
      <header class="sticky-top-white p-3 shadow-sm">
        <div class="container">
          <div class="input-group mb-3">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-search text-success"></i>
            </span>
            <input type="text" id="input-busca" class="form-control bg-light border-0" placeholder="Pesquisar receitas....">
          </div>
          <div class="d-flex overflow-x-auto gap-2 pb-2" style="scrollbar-width: none;">
            <button class="btn btn-success btn-categoria rounded-pill px-4" data-categoria="tudo">Tudo</button>

           <button class="btn btn-outline-secondary btn-categoria rounded-pill px-4 text-nowrap" data-categoria="Massas">Massas</button>

           <button class="btn btn-outline-secondary btn-categoria rounded-pill px-4 text-nowrap" data-categoria="Saudável">Saudável</button>

           <button class="btn btn-outline-secondary btn-categoria rounded-pill px-4 text-nowrap" data-categoria="Rápido">Rápido</button>
          </div>
          </div>
      </header>
      </div>
       <main class="container my-4">
        <div class="row g-3" id="lista-receitas">
          <!-- Card de Exemplo (Será gerado pelo TS depois) -->
        </div>
       </main>
     </div>

     <div class="modal fade" id="recipeModal" tabindex="-1" aria-hidden="true">
     <div class="modal-dialog modal-dialog-centered">
     <div class="modal-content">
       <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
       </div>
       <div class="modal-body">
        <h6 class="fw-bold">Ingredientes</h6>
        <ul id="modalIngredients" class="mb-4"></ul>
        <h6 class="fw-bold">Passo a Passo</h6>
        <p id="modalInstructions" class="text-muted"></p>
       </div>
     </div>
     </div>
    </div>
    <script type="module" src="/src/main.ts"></script>

  
  </body>
</html>
