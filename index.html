<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>buscador-receitas-ts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body class="bg-light">
    <div class="app">
      <header class="sticky-top-white p-3 shadow-sm">
        <div class="container">
          <div class="input-group mb-3">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-search text-success"></i>
            </span>
            <input type="text" id="input-busca" class="form-control bg-light border-0" placeholder="Pesquisar receitas....">
          </div>
          <div class="d-flex overflow-x-auto gap-2 pb-2" style="scrollbar-width: none;">
            <button class="btn btn-success rounded-pill px-4">Tudo</button>
            <button class="btn btn-outline-success rounded-pill px-4 text-nowrap">Massas</button>
            <button class="btn btn-outline-success rounded-pill px-4 text-nowrap">Saudável</button>
            <button class="btn btn-outline-success rounded-pill px-4 text-nowrap">Rápido</button>
          </div>
          </div>
        </div>

      </header>

      <main class="container my-4">
        <div class="row g-3" id="lista-receitas">
          <!-- Card de Exemplo (Será gerado pelo TS depois) -->
          <div class="col-6 col-md-4 col-lg-3">
            <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
              <img src="https://images.unsplash.com/photo-1473093226795-af9932fe5856?q=80&w=400" class="card-img-top" alt="Pasta">
              <div class="card-body p-2">
                <h6 class="card-title fw-bold mb-1" style="font-size: 0.9rem;">Macarrão Pesto</h6>
                <div class="d-flex align-items-center text-muted" style="font-size: 0.75rem;">
                  <i class="bi bi-clock me-1"></i> 20 min
                  <i class="bi bi-bar-chart-fill ms-2 me-1"></i> Fácil
                </div>
              </div>
            </div>
          </div>
          
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script

    
  </body>
</html>
